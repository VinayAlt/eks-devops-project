name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 \
        | docker login --username AWS --password-stdin 784074784226.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build Docker image
      run: docker build -t eks-demo ./app

    - name: Tag image
      run: docker tag eks-demo:latest 784074784226.dkr.ecr.ap-south-1.amazonaws.com/eks-demo:latest

    - name: Push image to ECR
      run: docker push 784074784226.dkr.ecr.ap-south-1.amazonaws.com/eks-demo:latest

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ap-south-1 --name demo-eks

    - name: Deploy to EKS
      run: |
        helm upgrade --install eks-demo ./helm